{% set name = "wkhtmltopdf" %}
{% set major_minor = "0.12" %}
{% set version = major_minor + ".6" %}
{% set pkg_release = "1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: wkhtmltox-{{ version }}-{{ pkg_release }}.centos7.x86_64.rpm  # [linux]
  url: https://github.com/{{ name }}/packaging/releases/download/{{ version }}-{{ pkg_release }}/wkhtmltox-{{ version }}-{{ pkg_release }}.centos7.x86_64.rpm  # [linux]
  sha256: f390b5ea5bd00664ec088701243727275d519e41c9b165737c7929ebbb9b8e67  # [linux]

  fn: wkhtmltox-{{ version }}-{{ pkg_release }}.msvc2015-win64.exe  # [win]
  url: https://github.com/{{ name }}/packaging/releases/download/{{ version }}-{{ pkg_release }}/wkhtmltox-{{ version }}-{{ pkg_release }}.msvc2015-win64.exe  # [win]
  sha256: 1efcfaf8472871268fd399865a3e62b435b91d4413009b80830eaaff7a57d088  # [win]

build:
  number: 0
  skip: True  # [osx]

requirements:
  build:
    - libarchive  # [linux]
    - 7zip  # [win]
  run:
    - fontconfig  # [linux]
    - xorg-libxrender  # [linux]
    - xorg-libxext  # [linux]
    - vc >=14  # [win]

test:
  commands:
    - wkhtmltopdf -h

about:
  home: http://wkhtmltopdf.org/
  license: LGPL-3.0-or-later
  license_family: GPL
  license_file: '{{ environ["RECIPE_DIR"] }}/LICENSE'
  summary: 'Command line tools to render HTML into PDF and various image formats.'
  description: |
    wkhtmltopdf and wkhtmltoimage are open source (LGPLv3) command line tools
    to render HTML into PDF and various image formats using the Qt WebKit rendering engine.

extra:
  recipe-maintainers:
    - scopatz
